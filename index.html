<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed & Power Training Hub</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --background: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .intro-text {
            color: var(--text-muted);
            font-size: 1.2em;
            max-width: 600px;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        .nav-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 2px solid transparent;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-color);
        }

        .nav-card h2 {
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 15px;
        }

        .nav-card p {
            color: var(--text-muted);
            margin-bottom: 0;
        }
    </style>
</head>
<body>

    <header>
        <h1>Speed & Power Training</h1>
        <p class="intro-text">Select your training focus for today's session.</p>
    </header>

    <div class="nav-grid">
        <a href="plyometrics-plan.html" class="nav-card">
            <h2>💥 Plyometrics</h2>
            <p>4-week plan focusing on elasticity, force absorption, and vertical/horizontal power.</p>
        </a>

        <a href="sprinting-plan.html" class="nav-card">
            <h2>⚡ Sprinting</h2>
            <p>4-week plan focusing on running mechanics, acceleration, and maximum velocity.</p>
        </a>
    </div>

</body>
</html>
